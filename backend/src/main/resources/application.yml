server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: multivendor-marketplace-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketplace}
    username: ${SPRING_DATASOURCE_USERNAME:marketplace}
    password: ${SPRING_DATASOURCE_PASSWORD:marketplace}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}

  security:
    filter:
      dispatcher-types: async, error, request

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

security:
  jwt:
    access-secret: ${SECURITY_JWT_ACCESS_SECRET:change-me-access-secret-32-bytes-min}
    refresh-secret: ${SECURITY_JWT_REFRESH_SECRET:change-me-refresh-secret-32-bytes-min}
    access-ttl-ms: ${SECURITY_JWT_ACCESS_TTL_MS:900000}       # 15 минут
    refresh-ttl-ms: ${SECURITY_JWT_REFRESH_TTL_MS:2592000000} # 30 дней

google:
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}

---

spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

